version: '3.8'
services:
  db:
    image: docker.io/library/postgres:15
    container_name: dartagnan_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dartagnan
      POSTGRES_USER: dtuser
      POSTGRES_PASSWORD: dtpassword
    volumes:
      - db_data:/var/lib/postgresql/data:Z
      - ./deploy/roles/athos/files/database.sql:/docker-entrypoint-initdb.d/01-database.sql:Z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtuser -d dartagnan || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dartagnan_net

  redis:
    image: docker.io/library/redis:7
    container_name: dartagnan_redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data:Z
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dartagnan_net

  athos:
    build:
      context: .
      dockerfile: Containerfile
    container_name: dartagnan_athos
    restart: unless-stopped
    depends_on:
      - db
      - redis
    networks:
      - dartagnan_net
    ports:
      - "8080:8080"

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  dartagnan_net:
    driver: bridge
